    }

    // ═══ FULL-SCREEN TEAR OVERLAY ═══
    const PENDING_KEY = 'ichiban_pending_draws';

    function savePendingDraws(sheetName, type, results) {
      const data = { user: S.user, sheetName, type, results: results.map((r, i) => ({ ...r, revealed: false })), timestamp: Date.now() };
      localStorage.setItem(PENDING_KEY, JSON.stringify(data));
    }
    function loadPendingDraws() {
      try {
        const raw = localStorage.getItem(PENDING_KEY); if (!raw) return null; const d = JSON.parse(raw);
        if (Date.now() - d.timestamp > 24 * 60 * 60 * 1000) { localStorage.removeItem(PENDING_KEY); return null } return d
      } catch (e) { return null }
    }
    function clearPendingDraws() { localStorage.removeItem(PENDING_KEY) }
    function markRevealed(idx) {
      try { const d = JSON.parse(localStorage.getItem(PENDING_KEY)); if (d && d.results[idx]) { d.results[idx].revealed = true; localStorage.setItem(PENDING_KEY, JSON.stringify(d)) } } catch (e) { }
    }

    let _tearAC = null; // AbortController for tear overlay events
    function openTearOverlay(prize, number, onComplete, queueInfo) {
      if (_tearAC) { _tearAC.abort(); _tearAC = null }
      _tearAC = new AbortController(); const sig = { signal: _tearAC.signal };
      const ov = $('m-tear-ov'); ov.classList.add('show');
      $('tov-num').textContent = '#' + String(number).padStart(2, '0');
      $('tov-hint').textContent = '👆 從任意方向滑動撕開！必須完全撕開才能開獎';
      $('tov-hint').style.display = '';
      // Prize layer (hidden behind canvas)
      const c = pColor(prize.level);
      $('tov-prize').innerHTML = `<div class="tov-lv" style="color:${c}">${prize.level}</div><div class="tov-nm">${prize.name}</div>${prize.imageUrl ? `<img src="${prize.imageUrl}" class="tov-img" onerror="this.style.display='none'">` : ''}`;
      // Queue progress
      if (queueInfo) { $('tov-progress').style.display = ''; $('tov-progress').textContent = `第 ${queueInfo.current} / ${queueInfo.total} 張`; $('tov-skip-all').style.display = '' }
      else { $('tov-progress').style.display = 'none'; $('tov-skip-all').style.display = 'none' }
      $('tov-skip-btn').style.display = '';
      // Use rAF to ensure overlay is rendered and sized before drawing canvas
      requestAnimationFrame(() => {
        requestAnimationFrame(() => {
          const canvas = $('tov-canvas'); const wrap = canvas.parentElement;
          const W = wrap.clientWidth || 320, H = wrap.clientHeight || 440;
          canvas.width = W; canvas.height = H; canvas.style.position = 'relative'; canvas.style.zIndex = '5';
          const ctx = canvas.getContext('2d');
          // Gold paper texture
          const g = ctx.createLinearGradient(0, 0, W, H); g.addColorStop(0, '#A0855C'); g.addColorStop(.25, '#D4AF61'); g.addColorStop(.5, '#B8942F'); g.addColorStop(.75, '#D4B96A'); g.addColorStop(1, '#A07D4A'); ctx.fillStyle = g; ctx.fillRect(0, 0, W, H);
          ctx.globalAlpha = 0.06; for (let i = 0; i < 30; i++) { ctx.strokeStyle = Math.random() > .5 ? '#000' : '#fff'; ctx.lineWidth = Math.random() * 1.5; ctx.beginPath(); const sx = Math.random() * W, sy = Math.random() * H; ctx.moveTo(sx, sy); ctx.lineTo(sx + Math.random() * 20 - 10, sy + Math.random() * 20 - 10); ctx.stroke() } ctx.globalAlpha = 1;
          ctx.strokeStyle = 'rgba(0,0,0,.03)'; ctx.lineWidth = .5; for (let i = -H; i < W; i += 6) { ctx.beginPath(); ctx.moveTo(i, 0); ctx.lineTo(i + H, H); ctx.stroke() }
          for (let i = 0; i < W + H; i += 6) { ctx.beginPath(); ctx.moveTo(i, 0); ctx.lineTo(i - H, H); ctx.stroke() }
          const numStr = String(number).padStart(2, '0');
          ctx.textAlign = 'center'; ctx.textBaseline = 'middle'; ctx.font = `bold ${W * .22}px serif`;
          ctx.fillStyle = 'rgba(255,255,255,.15)'; ctx.fillText(numStr, W / 2 + 1, H * .28 + 1); ctx.fillStyle = 'rgba(0,0,0,.35)'; ctx.fillText(numStr, W / 2, H * .28);
          ctx.font = `600 ${W * .09}px ${getComputedStyle(document.body).fontFamily}`; ctx.fillStyle = 'rgba(0,0,0,.25)'; ctx.fillText('一 番 賞', W / 2, H * .42);
          ctx.setLineDash([3, 5]); ctx.strokeStyle = 'rgba(0,0,0,.25)'; ctx.lineWidth = 1.5; ctx.beginPath(); ctx.moveTo(W * .08, H * .52); ctx.lineTo(W * .92, H * .52); ctx.stroke(); ctx.setLineDash([]);
          ctx.font = `${W * .06}px ${getComputedStyle(document.body).fontFamily}`; ctx.fillStyle = 'rgba(0,0,0,.2)'; ctx.fillText('✂ - - - - - - - ✂', W / 2, H * .52);
          ctx.font = `bold ${W * .07}px ${getComputedStyle(document.body).fontFamily}`; ctx.fillStyle = 'rgba(0,0,0,.25)'; ctx.fillText('⬇ 由此撕開 ⬇', W / 2, H * .68);
          const shine = ctx.createLinearGradient(0, 0, W, 0); shine.addColorStop(0, 'rgba(255,255,255,0)'); shine.addColorStop(.45, 'rgba(255,255,255,0)'); shine.addColorStop(.5, 'rgba(255,255,255,.1)'); shine.addColorStop(.55, 'rgba(255,255,255,0)'); shine.addColorStop(1, 'rgba(255,255,255,0)'); ctx.fillStyle = shine; ctx.fillRect(0, 0, W, H);
          const origData = ctx.getImageData(0, 0, W, H);
          const jags = Array.from({ length: 60 }, () => (Math.random() - .5) * 10);
          let tearProg = 0, tearDir = null, dragging = false, sx = 0, sy = 0, revealed = false;
          const _pc = c; // prize color for drawTear
          canvas._onComplete = onComplete; canvas._prize = prize; canvas._revealed = false;
          function onStart(e) { if (revealed) return; e.preventDefault(); const t = e.touches ? e.touches[0] : e; const r = canvas.getBoundingClientRect(); sx = t.clientX - r.left; sy = t.clientY - r.top; dragging = true; tearDir = null; tearProg = 0 }
          function onMove(e) {
            if (!dragging || revealed) return; e.preventDefault(); const t = e.touches ? e.touches[0] : e; const r = canvas.getBoundingClientRect(); const ex = t.clientX - r.left, ey = t.clientY - r.top; const dx = ex - sx, dy = ey - sy;
            if (!tearDir) { const ad = Math.abs(dx), ay = Math.abs(dy); if (ad > 15 || ay > 15) tearDir = ad > ay ? (dx > 0 ? 'right' : 'left') : (dy > 0 ? 'down' : 'up') }
            if (!tearDir) return;
            const dist = tearDir === 'right' || tearDir === 'left' ? Math.abs(dx) : Math.abs(dy); const max = tearDir === 'right' || tearDir === 'left' ? W : H;
            tearProg = Math.min(1, dist / (max * .55)); drawTear(ctx, W, H, origData, tearProg, tearDir, jags, _pc);
            if (tearProg >= .95) { dragging = false; revealed = true; canvas._revealed = true; finishOverlayTear(ctx, W, H, origData, tearProg, tearDir, jags, prize, onComplete) }
          }
          function onEnd() {
            if (dragging) { dragging = false }
            if (!revealed && tearProg > 0 && tearProg < .95) {
              // Smooth snap-back animation
              let snapProg = tearProg; const snapDir = tearDir;
              function snapBack() {
                snapProg -= 0.06;
                if (snapProg <= 0) { snapProg = 0; tearProg = 0; tearDir = null; ctx.putImageData(origData, 0, 0); return }
                drawTear(ctx, W, H, origData, snapProg, snapDir, jags, _pc);
                requestAnimationFrame(snapBack);
              }
              requestAnimationFrame(snapBack);
            }
          }
          canvas.addEventListener('mousedown', onStart, sig); canvas.addEventListener('mousemove', onMove, sig); canvas.addEventListener('mouseup', onEnd, sig); canvas.addEventListener('mouseleave', onEnd, sig);
          canvas.addEventListener('touchstart', onStart, { passive: false, ...sig }); canvas.addEventListener('touchmove', onMove, { passive: false, ...sig }); canvas.addEventListener('touchend', onEnd, sig);
        })
      });
    }

    function finishOverlayTear(ctx, W, H, origData, prog, dir, jags, prize, onComplete) {
      $('tov-hint').textContent = '🎊 開獎中...';
      function step() {
        prog += 0.05; if (prog >= 1) {
          ctx.clearRect(0, 0, W, H);
          $('tov-hint').style.display = 'none'; $('tov-skip-btn').style.display = 'none';
          const big = ['A賞', 'B賞'].includes(prize.level); if (big) startConfetti();
          setTimeout(() => {
            stopConfetti(); $('m-tear-ov').classList.remove('show');
            showResult(prize, S.user); if (onComplete) onComplete()
          }, 1200); return
        }
        drawTear(ctx, W, H, origData, prog, dir, jags, pColor(prize.level)); requestAnimationFrame(step)
      }
      requestAnimationFrame(step)
    }

    function skipCurrentReveal() {
      const canvas = $('tov-canvas');
      const ov = $('m-tear-ov'); ov.classList.remove('show');
      const prize = canvas._prize; const onComplete = canvas._onComplete;
      if (prize) showResult(prize, S.user);
      if (onComplete) setTimeout(onComplete, 300);
    }

    function skipAllReveals() {
      $('m-tear-ov').classList.remove('show');
      // Show all remaining results at once
      const remaining = S.multiQueue.slice(S.revealIdx).filter(r => r.success);
      if (remaining.length) { showMultiResult(remaining.map(r => r.prize), S.user) }
      clearPendingDraws();
      if (S.curAct) loadGame(S.curAct.sheetName, 'kuji');
    }

    function startMultiRevealQueue(results, sh) {
      S.multiQueue = results; S.revealIdx = 0;
      savePendingDraws(sh, 'kuji', results);
      nextInQueue(sh);
    }

    function nextInQueue(sh) {
      if (S.revealIdx >= S.multiQueue.length) {
        clearPendingDraws();
        if (sh || S.curAct) loadGame(sh || S.curAct.sheetName, 'kuji'); return
      }
      const r = S.multiQueue[S.revealIdx];
      if (!r.success) { markRevealed(S.revealIdx); S.revealIdx++; nextInQueue(sh); return }
      openTearOverlay(r.prize, r.prize.number, () => {
        markRevealed(S.revealIdx); S.revealIdx++;
        nextInQueue(sh);
      }, { current: S.revealIdx + 1, total: S.multiQueue.length });
    }

    function checkPendingDraws() {
      const d = loadPendingDraws(); if (!d) return;
      if (S.user && S.user !== d.user) { clearPendingDraws(); return }
      const unrevealed = d.results.filter(r => !r.revealed);
      if (!unrevealed.length) { clearPendingDraws(); return }
      // Show banner
      const banner = document.createElement('div'); banner.className = 'pending-banner'; banner.id = 'pending-banner';
      banner.innerHTML = `<i class="fas fa-gift" style="color:var(--gold);font-size:1.3rem"></i><div><div style="color:var(--gold);font-weight:700">您有 ${unrevealed.length} 張未開獎！</div><div style="color:var(--txt3);font-size:.8rem">點擊繼續開獎或查看結果</div></div><div style="display:flex;gap:8px"><button class="btn btn-gold btn-sm" onclick="resumePendingDraws()">繼續開獎</button><button class="btn btn-outline btn-sm" onclick="showPendingResults()">直接看結果</button></div>`;
      document.body.appendChild(banner);
    }

    function resumePendingDraws() {
      document.getElementById('pending-banner')?.remove();
      const d = loadPendingDraws(); if (!d) return;
      S.multiQueue = d.results; S.revealIdx = d.results.findIndex(r => !r.revealed);
      if (S.revealIdx < 0) { clearPendingDraws(); return }
      nextInQueue(d.sheetName);
    }

    function showPendingResults() {
      document.getElementById('pending-banner')?.remove();
      const d = loadPendingDraws(); if (!d) { return }
      const prizes = d.results.filter(r => r.success && !r.revealed).map(r => r.prize);
      if (prizes.length) showMultiResult(prizes, d.user);
      clearPendingDraws();
    }

    function instantReveal(idx, sh) {
      if (!S.user) { toast('請先登入', 'error'); return }
      doSingleDraw(idx, sh);
    }

    async function doSingleDraw(idx, sh) {
      const player = S.user; if (!player) { toast('請先登入', 'error'); return }
      delete _detailCache[sh]; // Invalidate cache
      const item = S.curItems[idx]; const tnum = item['編號'] ?? item['號碼'] ?? Object.values(item)[0];
      showLoading(); try {
        const r = await api('drawPrize', { sheetName: sh, playerName: player, ticketNumbers: JSON.stringify([tnum]) }); hideLoading();
        if (r.results && Array.isArray(r.results) && r.results.length > 0) {
          const res = r.results[0]; if (res.success) {
            savePendingDraws(sh, 'kuji', [res]);
            openTearOverlay(res.prize, tnum, () => { clearPendingDraws(); loadGame(sh, 'kuji') });
          } else { toast(res.error || '已被抽走', 'error'); loadGame(sh, 'kuji') }
        }
        else if (r.error) { toast(r.error, 'error'); loadGame(sh, 'kuji') }
        else { toast('回應格式異常', 'error'); loadGame(sh, 'kuji') }
      } catch (e) { hideLoading(); toast('連線失敗: ' + e.message, 'error'); loadGame(sh, 'kuji') }
    }

    async function doMultiDraw(indices, sh, player) {
      delete _detailCache[sh]; showLoading(); try {
        const ticketNums = indices.map(i => { const it = S.curItems[i]; return it['編號'] ?? it['號碼'] ?? Object.values(it)[0] });
        const r = await api('drawPrize', { sheetName: sh, playerName: player, ticketNumbers: JSON.stringify(ticketNums) }); hideLoading();
        if (r.results) {
          const fail = r.results.filter(x => !x.success);
          if (fail.length) fail.forEach(f => toast(f.error, 'error'));
          const ok = r.results.filter(x => x.success);
          if (ok.length) { startMultiRevealQueue(r.results, sh) }
          else { loadGame(sh, 'kuji') }
        } else { toast(r.error || '失敗', 'error') }
      } catch (e) { hideLoading(); toast('連線失敗', 'error') }
    }

    function clearSelection() { S.selected = []; document.querySelectorAll('.ticket').forEach(t => t.classList.remove('selected')); updDrawBar() }

    // ═══ SCRATCH GAME ═══
    function rScratch(sh) {
      const a = S.curAct; $('sc-title').textContent = a.name; $('sc-meta').textContent = `已刮 ${a.drawn}/${a.total}`;
      $('sc-player-info').innerHTML = `<i class="fas fa-user"></i> 抽獎者：${S.user}`;
      const sp = +a.singlePrice, mc = +a.multiCount, mp = +a.multiPrice, rem = (+a.total) - (+a.drawn);
      let ph = '<div class="draw-mode-selector"><span class="dms-label">🎰 選取模式：</span>';
      ph += `<button class="dms-btn ${S.drawMode === 'single' ? 'sel' : ''}" onclick="setScMode('single','${sh}')">單次刮開${sp ? `<span class="dms-price">${sp}元</span>` : ''}</button>`;
      if (mc && mc > 0 && rem >= mc) ph += `<button class="dms-btn ${S.drawMode === 'multi' ? 'sel' : ''}" onclick="setScMode('multi','${sh}')">${mc} 次大量刮開${mp ? `<span class="dms-price">${mp}元</span>` : ''}</button>`;
      ph += '</div>'; $('sc-price').innerHTML = ph;
      const bg = a.hasBigPrize; $('sc-banner').innerHTML = `<div class="big-banner ${bg === '有' ? 'has' : 'gone'}">${bg === '有' ? '🏆 大獎尚在！' : '😢 大獎已出...'}</div>`;
      $('sc-drawbar').style.display = (S.drawMode === 'multi') ? 'flex' : 'none';
      const items = S.curItems; const t = items.length; const cls = t <= 20 ? 'g20' : t <= 40 ? 'g40' : t <= 80 ? 'g80' : 'g100';
      let h = `<div class="scratch-grid ${cls}">`; items.forEach(it => {
        const n = it['號碼'], sc = it['狀態'] === '已刮', lv = it['獎項等級'], c = pColor(lv);
        if (sc) h += `<div class="scratch-card revealed"><div class="card-bg" style="background:${c}"><div class="sc-num">#${n}</div><div class="sc-prize">${lv}</div></div></div>`;
        else h += `<div class="scratch-card ${S.selected.includes(String(n)) ? 'selected' : ''}" data-num="${n}" data-sheet="${sh}"><div class="card-bg" style="background:${c}"><div class="sc-num">#${n}</div><div class="sc-prize">${lv}</div></div><canvas></canvas></div>`
      });
      h += '</div>'; $('sc-grid-wrap').innerHTML = h;
      document.querySelectorAll('.scratch-card:not(.revealed)').forEach(initScratchCanvas); rPanel(S.curStats, 'sc-panel'); updScDrawBar()
    }

    function setScMode(m, sh) {
      S.drawMode = m; S.selected = []; const rem = (+S.curAct.total) - (+S.curAct.drawn);
      document.querySelectorAll('.draw-mode-selector .dms-btn').forEach(d => d.classList.remove('sel'));
      if (m === 'single') { document.querySelectorAll('.draw-mode-selector .dms-btn')[0]?.classList.add('sel'); $('sc-drawbar').style.display = 'none' }
      else { const btns = document.querySelectorAll('.draw-mode-selector .dms-btn'); if (btns[1]) btns[1].classList.add('sel'); if (rem < S.multiN) { toast(`剩餘${rem}張，不足${S.multiN}抽`, 'error'); setScMode('single', sh); return } $('sc-drawbar').style.display = 'flex' }
      document.querySelectorAll('.scratch-card').forEach(t => t.classList.remove('selected')); updScDrawBar()
    }

    function updScDrawBar() { $('sc-sel-ct').textContent = `已選 ${S.selected.length}/${S.drawMode === 'multi' ? S.multiN : 1} 張`; $('sc-draw-btn').disabled = S.selected.length < (S.drawMode === 'multi' ? S.multiN : 1) }

    function clearScratchSelection() { S.selected = []; document.querySelectorAll('.scratch-card').forEach(t => t.classList.remove('selected')); updScDrawBar() }

    function initScratchCanvas(card) {
      // Simple click handler for scratch cards - no inline scratching
      card.addEventListener('click', () => {
        if (card.classList.contains('revealed')) return;
        const n = card.dataset.num, sh = card.dataset.sheet;
        if (S.drawMode === 'multi') {
          const si = S.selected.indexOf(String(n));
          if (si >= 0) { S.selected.splice(si, 1); card.classList.remove('selected') }
          else { if (S.selected.length >= S.multiN) { toast(`最多選${S.multiN}張`, 'info'); return } S.selected.push(String(n)); card.classList.add('selected') }
          updScDrawBar();
        } else {
          // Single mode: confirm then buy
          if (!S.user) { toast('請先登入', 'error'); return }
          $('draw-cf-content').innerHTML = `<p style="font-size:1.1rem">確定要刮開 <b style="color:var(--gold)">#${n}</b> 嗎？</p><p style="font-size:.8rem;margin-top:6px;color:var(--txt3)">確認後進入全螢幕刮獎體驗</p>`;
          $('draw-cf-ok').onclick = () => { closeModal('m-draw-cf'); doSingleScratch(n, sh) }; showModal('m-draw-cf');
        }
      });
      // Render a silver cover appearance
      const canvas = card.querySelector('canvas'); if (!canvas) return;
      const rect = card.getBoundingClientRect(); canvas.width = rect.width || 80; canvas.height = rect.height || 80; const ctx = canvas.getContext('2d');
      const g = ctx.createLinearGradient(0, 0, canvas.width, canvas.height); g.addColorStop(0, '#b0b0b0'); g.addColorStop(.3, '#d8d8d8'); g.addColorStop(.5, '#a0a0a0'); g.addColorStop(1, '#b0b0b0'); ctx.fillStyle = g; ctx.fillRect(0, 0, canvas.width, canvas.height);
      ctx.fillStyle = 'rgba(0,0,0,.25)'; ctx.font = `bold ${Math.min(canvas.width, canvas.height) * 0.35}px serif`; ctx.textAlign = 'center'; ctx.textBaseline = 'middle'; ctx.fillText(card.dataset.num, canvas.width / 2, canvas.height / 2);
      ctx.strokeStyle = 'rgba(255,255,255,.08)'; for (let i = -canvas.height; i < canvas.width; i += 8) { ctx.beginPath(); ctx.moveTo(i, 0); ctx.lineTo(i + canvas.height, canvas.height); ctx.stroke() }
    }

    // ═══ SCRATCH OVERLAY ═══
    let _scratchAC = null, _scratchQueue = [], _scratchQIdx = 0;

    async function doSingleScratch(num, sh) {
      if (!S.user) { toast('請先登入', 'error'); return }
      delete _detailCache[sh];
      showLoading(); try {
        const r = await api('scratchNumber', { sheetName: sh, numberList: JSON.stringify([parseInt(num)]), playerName: S.user }); hideLoading();
        if (r.success || r.results) {
          const res = (r.results || [])[0];
          if (res && res.success) { openScratchOverlay(res.prize, num, () => { loadGame(sh, 'scratch') }) }
          else { toast(res?.error || '失敗', 'error'); loadGame(sh, 'scratch') }
        } else { toast(r.error || '失敗', 'error') }
      } catch (e) { hideLoading(); toast('連線失敗', 'error') }
    }

    function openScratchOverlay(prize, number, onComplete, queueInfo) {
      if (_scratchAC) { _scratchAC.abort(); _scratchAC = null }
      _scratchAC = new AbortController(); const sig = { signal: _scratchAC.signal };
      const ov = $('m-scratch-ov'); ov.classList.add('show');
      $('sov-num').textContent = '#' + String(number);
      $('sov-hint').textContent = '👆 用力刮開銀色區域！'; $('sov-hint').style.display = '';
      $('sov-skip-btn').style.display = '';
      const c = pColor(prize.level);
      $('sov-prize').innerHTML = `<div class="sov-lv" style="color:${c}">${prize.level}</div><div class="sov-nm">${prize.name}</div>${prize.imageUrl ? `<img src="${prize.imageUrl}" class="tov-img" onerror="this.style.display='none'">` : ''}`;
      if (queueInfo) { $('sov-progress').style.display = ''; $('sov-progress').textContent = `第 ${queueInfo.current} / ${queueInfo.total} 張`; $('sov-skip-all').style.display = '' }
      else { $('sov-progress').style.display = 'none'; $('sov-skip-all').style.display = 'none' }
      // Store refs
      const canvas = $('sov-canvas'); canvas._prize = prize; canvas._onComplete = onComplete;
      requestAnimationFrame(() => {
        requestAnimationFrame(() => {
          const wrap = $('sov-wrap'); const W = wrap.clientWidth || 320, H = wrap.clientHeight || 320;
          canvas.width = W; canvas.height = H; canvas.style.position = 'absolute'; canvas.style.zIndex = '5';
          const ctx = canvas.getContext('2d');
          // Silver card
          const g = ctx.createLinearGradient(0, 0, W, H); g.addColorStop(0, '#b8b8b8'); g.addColorStop(.2, '#e0e0e0'); g.addColorStop(.4, '#a0a0a0'); g.addColorStop(.6, '#d0d0d0'); g.addColorStop(.8, '#b0b0b0'); g.addColorStop(1, '#c0c0c0'); ctx.fillStyle = g; ctx.fillRect(0, 0, W, H);
          // Texture
          ctx.globalAlpha = 0.04; for (let i = 0; i < 30; i++) { ctx.strokeStyle = Math.random() > .5 ? '#000' : '#fff'; ctx.lineWidth = Math.random() * 2; ctx.beginPath(); ctx.moveTo(Math.random() * W, Math.random() * H); ctx.lineTo(Math.random() * W, Math.random() * H); ctx.stroke() } ctx.globalAlpha = 1;
          // Cross hatch
          ctx.strokeStyle = 'rgba(255,255,255,.06)'; ctx.lineWidth = .5; for (let i = -H; i < W; i += 8) { ctx.beginPath(); ctx.moveTo(i, 0); ctx.lineTo(i + H, H); ctx.stroke() }
          // Number
          ctx.textAlign = 'center'; ctx.textBaseline = 'middle'; ctx.font = `bold ${W * .2}px serif`; ctx.fillStyle = 'rgba(0,0,0,.12)'; ctx.fillText('#' + number, W / 2, H * .35);
          ctx.font = `600 ${W * .08}px ${getComputedStyle(document.body).fontFamily}`; ctx.fillStyle = 'rgba(0,0,0,.1)'; ctx.fillText('刮 刮 樂', W / 2, H * .55);
          ctx.font = `bold ${W * .06}px ${getComputedStyle(document.body).fontFamily}`; ctx.fillStyle = 'rgba(0,0,0,.12)'; ctx.fillText('⬆ 刮開此處 ⬆', W / 2, H * .72);
          let scr = 0, isDown = false; const tot = W * H; const br = Math.min(W, H) * .06; let revealed = false; let strokeCount = 0;
          const debrisColors = ['#c0c0c0', '#d8d8d8', '#a0a0a0', '#e0e0e0', '#b0b0b0'];
          function checkScratchPercent() {
            const imgData = ctx.getImageData(0, 0, W, H).data; let cleared = 0;
            for (let i = 3; i < imgData.length; i += 16) { if (imgData[i] === 0) cleared++ } // sample every 4th pixel's alpha
            return cleared / (imgData.length / 16);
          }
          function spawnDebris(x, y) {
            for (let i = 0; i < 3; i++) {
              const d = document.createElement('div'); d.className = 'scratch-debris';
              d.style.left = (x + Math.random() * 20 - 10) + 'px'; d.style.top = (y + Math.random() * 20 - 10) + 'px';
              d.style.background = debrisColors[Math.floor(Math.random() * debrisColors.length)];
              d.style.width = (3 + Math.random() * 5) + 'px'; d.style.height = (2 + Math.random() * 3) + 'px';
              d.style.transform = `rotate(${Math.random() * 360}deg)`;
              wrap.appendChild(d);
              const vx = (Math.random() - .5) * 4, vy = Math.random() * 3 + 1; let px = parseFloat(d.style.left), py = parseFloat(d.style.top), op = .8;
              function anim() {
                px += vx; py += vy; op -= 0.02; d.style.left = px + 'px'; d.style.top = py + 'px'; d.style.opacity = op;
                if (op > 0) requestAnimationFrame(anim); else d.remove()
              }
              requestAnimationFrame(anim);
            }
          }
          function scrAt(x, y) {
            if (revealed) return; ctx.globalCompositeOperation = 'destination-out'; ctx.beginPath(); ctx.arc(x, y, br, 0, Math.PI * 2); ctx.fill();
            // Spawn debris less frequently for performance
            if (strokeCount % 3 === 0) spawnDebris(x, y);
            strokeCount++; if (strokeCount % 10 === 0) { const pct = checkScratchPercent(); if (pct > .55 && !revealed) { revealed = true; finishScratchReveal(ctx, W, H, prize, onComplete) } }
          }
          function onStart(e) { if (revealed) return; e.preventDefault(); isDown = true; const t = e.touches ? e.touches[0] : e; const r = canvas.getBoundingClientRect(); scrAt(t.clientX - r.left, t.clientY - r.top) }
          function onMove(e) { if (!isDown || revealed) return; e.preventDefault(); const t = e.touches ? e.touches[0] : e; const r = canvas.getBoundingClientRect(); scrAt(t.clientX - r.left, t.clientY - r.top) }
          function onEnd() { isDown = false }
          canvas.addEventListener('mousedown', onStart, sig); canvas.addEventListener('mousemove', onMove, sig); canvas.addEventListener('mouseup', onEnd, sig); canvas.addEventListener('mouseleave', onEnd, sig);
          canvas.addEventListener('touchstart', onStart, { passive: false, ...sig }); canvas.addEventListener('touchmove', onMove, { passive: false, ...sig }); canvas.addEventListener('touchend', onEnd, sig);
        })
      });
    }

    function finishScratchReveal(ctx, W, H, prize, onComplete) {
      $('sov-hint').textContent = '🎊 開獎中...';
      // Fade out remaining silver
      let alpha = 1; function fadeStep() {
        alpha -= 0.08; if (alpha <= 0) {
          ctx.clearRect(0, 0, W, H); $('sov-hint').style.display = 'none'; $('sov-skip-btn').style.display = 'none';
          const big = ['A賞', 'B賞'].includes(prize.level); if (big) startConfetti();
          setTimeout(() => { stopConfetti(); $('m-scratch-ov').classList.remove('show'); showResult(prize, S.user); if (onComplete) onComplete() }, 800); return
        }
        ctx.globalCompositeOperation = 'destination-out'; ctx.fillStyle = `rgba(0,0,0,0.15)`; ctx.fillRect(0, 0, W, H); requestAnimationFrame(fadeStep)
      }
      requestAnimationFrame(fadeStep);
    }

    function skipScratchReveal() {
      $('m-scratch-ov').classList.remove('show');
      const canvas = $('sov-canvas');
      if (canvas._prize) showResult(canvas._prize, S.user);
      if (canvas._onComplete) setTimeout(canvas._onComplete, 300);
    }
    function skipAllScratchReveals() {
      $('m-scratch-ov').classList.remove('show');
      const remaining = _scratchQueue.slice(_scratchQIdx).filter(r => r.success);
      if (remaining.length) showMultiResult(remaining.map(r => r.prize), S.user);
      _scratchQueue = []; _scratchQIdx = 0;
      if (S.curAct) loadGame(S.curAct.sheetName, 'scratch');
    }

    async function revealCard(card) {/* legacy - now handled by overlay */ }

    function confirmScratch() {
      if (!S.user) { toast('請先登入', 'error'); return } const player = S.user;
      const sh = S.curAct.sheetName; const nums = S.selected.join(', ');
      $('draw-cf-content').innerHTML = `<p>確定購買 <b style="color:var(--gold)">${nums}</b> 號？</p><p style="font-size:.85rem;color:var(--txt2);margin-top:6px">共 ${S.selected.length} 張，逐張刮開</p>`;
      $('draw-cf-ok').onclick = () => { closeModal('m-draw-cf'); doMultiScratchBuy(S.selected, sh, player) }; showModal('m-draw-cf')
    }

    async function doMultiScratchBuy(nums, sh, player) {
      delete _detailCache[sh]; showLoading(); try {
        const r = await api('scratchNumber', { sheetName: sh, numberList: JSON.stringify(nums), playerName: player }); hideLoading();
        if (r.results) {
          const fail = r.results.filter(x => !x.success);
          if (fail.length) fail.forEach(f => toast(f.error, 'error'));
          const ok = r.results.filter(x => x.success);
          if (ok.length) { _scratchQueue = r.results; _scratchQIdx = 0; nextScratchInQueue(sh) }
          else loadGame(sh, 'scratch')
        } else { toast(r.error || '失敗', 'error') }
      } catch (e) { hideLoading(); toast('連線失敗', 'error') }
    }

    function nextScratchInQueue(sh) {
      if (_scratchQIdx >= _scratchQueue.length) { _scratchQueue = []; _scratchQIdx = 0; loadGame(sh || S.curAct.sheetName, 'scratch'); return }
      const r = _scratchQueue[_scratchQIdx];
      if (!r.success) { _scratchQIdx++; nextScratchInQueue(sh); return }
      openScratchOverlay(r.prize, r.prize.number || (_scratchQIdx + 1), () => { _scratchQIdx++; nextScratchInQueue(sh) }, { current: _scratchQIdx + 1, total: _scratchQueue.length });
    }

    // ═══ RESULT ═══
    function showResult(prize, player) {
      const big = ['A賞', 'B賞'].includes(prize.level); const c = pColor(prize.level);
      $('res-content').innerHTML = `<div class="pop-in"><div style="font-size:.95rem;color:var(--txt3);margin-bottom:6px">${big ? '🎉 恭喜中大獎！🎉' : '🎊 恭喜！'}</div>
${prize.imageUrl ? `<img src="${prize.imageUrl}" class="prize-res-img" onerror="this.style.display='none'">` : ''}
<div class="rl" style="color:${c}">${prize.level}</div><div class="rn">${prize.name}</div>${prize.description ? `<div class="rd">${prize.description}</div>` : ''}<div class="rp"><i class="fas fa-user"></i> ${player}</div></div>`;
      showModal('m-result'); if (big) startConfetti()
    }

    function showMultiResult(prizes, player) {
      const big = prizes.some(p => ['A賞', 'B賞'].includes(p.level));
      let h = `<div style="font-size:.95rem;color:var(--txt3);margin-bottom:14px">${big ? '🎉 恭喜！中大獎了！' : '🎊 抽獎結果'}</div><div class="multi-results">`;
      prizes.forEach(p => {
        const c = pColor(p.level); h += `<div class="mr-item">
${p.imageUrl ? `<img src="${p.imageUrl}" style="width:40px;height:40px;object-fit:cover;border-radius:6px;background:rgba(0,0,0,.2)" onerror="this.style.display='none'">` : ''}
<div class="mr-lv" style="color:${c}">${p.level}</div><div class="mr-nm">${p.name}</div></div>`
      });
      h += `</div><div class="rp" style="margin-top:12px"><i class="fas fa-user"></i> ${player}</div>`;
      $('res-content').innerHTML = h; showModal('m-result'); if (big) startConfetti()
    }
    function closeResult() { closeModal('m-result'); stopConfetti() }

    // ═══ CONFETTI ═══
    let cP = [], cA = null, cTimer = null;
    function startConfetti() {
      stopConfetti(); const cv = $('confetti'); cv.width = innerWidth; cv.height = innerHeight; const ctx = cv.getContext('2d'); cP = []; const cl = ['#ffd700', '#ff6b6b', '#48dbfb', '#ff9ff3', '#54a0ff', '#f368e0']; for (let i = 0; i < 100; i++)cP.push({ x: Math.random() * cv.width, y: Math.random() * cv.height - cv.height, w: Math.random() * 8 + 3, h: Math.random() * 5 + 2, c: cl[i % 6], vx: (Math.random() - .5) * 3, vy: Math.random() * 3 + 2, r: Math.random() * 360, rv: (Math.random() - .5) * 7 });
      function d() { ctx.clearRect(0, 0, cv.width, cv.height); cP.forEach(p => { p.x += p.vx; p.y += p.vy; p.r += p.rv; if (p.y > cv.height + 20) { p.y = -20; p.x = Math.random() * cv.width } ctx.save(); ctx.translate(p.x, p.y); ctx.rotate(p.r * Math.PI / 180); ctx.fillStyle = p.c; ctx.fillRect(-p.w / 2, -p.h / 2, p.w, p.h); ctx.restore() }); cA = requestAnimationFrame(d) } d();
      // 自動停止confetti，最多3秒
      cTimer = setTimeout(() => stopConfetti(), 3000)
    }
    function stopConfetti() { if (cA) cancelAnimationFrame(cA); cA = null; if (cTimer) { clearTimeout(cTimer); cTimer = null } const cv = $('confetti'); if (cv) cv.getContext('2d').clearRect(0, 0, innerWidth, innerHeight) }

    // === FLOATING PARTICLES ===
    function initParticles() {
      const container = $('particles-bg');
      if (!container) return;
      for (let i = 0; i < 15; i++) {
        const p = document.createElement('div');
        p.className = 'particle';
        p.style.left = Math.random() * 100 + '%';
        p.style.animationDuration = (8 + Math.random() * 12) + 's';
        p.style.animationDelay = Math.random() * 8 + 's';
        p.style.width = (2 + Math.random() * 3) + 'px';
        p.style.height = p.style.width;
        p.style.background = Math.random() > 0.5 ? 'rgba(255, 215, 0, .12)' : 'rgba(139, 92, 246, .1)';
        container.appendChild(p);
      }
    }

    document.addEventListener('DOMContentLoaded', () => { if (!location.hash) location.hash = '#/home'; R.init(); setTimeout(checkPendingDraws, 1000); initParticles(); });


  </script>
